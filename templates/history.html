<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <title>История</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

    <h2 class="mb-4">

        История распознаваний

    </h2>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Дата</th>

            <th>Изображение</th>

            <th>Top-1</th>

            <th>Вероятность</th>

        </tr>

        </thead>

        <tbody>

        {% for item in history %}

        <tr>

            <td>{{ item.id }}</td>

            <td>{{ item.datetime }}</td>

            <td>{{ item.filename }}</td>

            <td>{{ item.prediction }}</td>

            <td>{{ item.confidence }}%</td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

    <a
            href="/"
            class="btn btn-primary">

        На главную

    </a>

</div>

</body>

</html>
