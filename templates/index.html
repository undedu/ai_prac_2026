<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <title>AI_prac_2026_ubvt2303</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

    <div class="text-center mb-5">

        <h1>Распознавание блюда по фотографии</h1>

        <p class="text-muted">

            Ушаков УБВТ2303

        </p>

        <span class="badge bg-success">

            Лучшая модель:
            {{ model_name }}

        </span>

    </div>

    <div class="card shadow p-4">

        <form method="POST"
              enctype="multipart/form-data">

            <div class="mb-4">

                <input
                        class="form-control"
                        type="file"
                        name="image"
                        required>

            </div>

            <button
                    class="btn btn-primary w-100">

                Распознать блюдо

            </button>

        </form>

    </div>

    {% if image %}

    <div class="row mt-5">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header">

                    Изображение

                </div>

                <div class="card-body text-center">

                    <img
                            src="{{ url_for('static', filename='uploads/' + image) }}"
                            class="img-fluid rounded">

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header">

                    Top-3 Predictions

                </div>

                <div class="card-body">

                    <table class="table table-striped">

                        <thead>

                        <tr>

                            <th>№</th>

                            <th>Класс</th>

                            <th>Вероятность</th>

                        </tr>

                        </thead>

                        <tbody>

                        {% for item in predictions %}

                        <tr>

                            <td>{{ loop.index }}</td>

                            <td>{{ item.class }}</td>

                            <td>{{ item.probability }}%</td>

                        </tr>

                        {% endfor %}

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    {% endif %}

    <div class="text-center mt-5">

        <a
                href="/history"
                class="btn btn-outline-secondary">

            История запросов

        </a>


    </div>
	<button onclick="window.location.href='/download_report'">
    Скачать отчёт (.xlsx)
	</button>

</div>

</body>

</html>
